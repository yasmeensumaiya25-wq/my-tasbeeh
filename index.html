<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoulSync | Zikr & Quran</title>
    
    <link rel="apple-touch-icon" href="logo.png.jpg">
    <link rel="icon" type="image/png" href="logo.png.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg: #0A0C10;
            --sidebar-bg: #12151A;
            --accent-mint: #B2D8D8;
            --accent-rose: #FFD1DC;
            --accent-lavender: #E0BBE4;
            --text-main: #F0F6FC;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background-color: var(--bg); color: var(--text-main);
            font-family: 'Poppins', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* --- CLASSIC FLOATING LANTERNS --- */
        .lantern-container {
            position: fixed; top: 0; width: 100%; height: 150px;
            pointer-events: none; z-index: 5; display: flex; justify-content: space-around;
        }
        .lantern {
            width: 25px; height: 40px; background: var(--color);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: 0 0 15px var(--color); animation: sway 4s ease-in-out infinite;
            position: relative; opacity: 0.6;
        }
        .lantern::before {
            content: ""; position: absolute; top: -40px; left: 50%;
            width: 1px; height: 40px; background: rgba(255,255,255,0.2);
        }
        @keyframes sway { 
            0%, 100% { transform: rotate(-3deg); transform-origin: top; }
            50% { transform: rotate(3deg); transform-origin: top; }
        }

        /* --- MOBILE NAVIGATION --- */
        .mobile-header {
            display: none; padding: 15px 20px; background: var(--sidebar-bg);
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass); position: sticky; top: 0; z-index: 100;
        }
        .menu-toggle { font-size: 1.5rem; background: none; border: none; color: var(--accent-mint); cursor: pointer; }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 280px; background: var(--sidebar-bg); height: 100vh;
            position: fixed; left: 0; top: 0; padding: 40px 25px;
            border-right: 1px solid var(--glass); display: flex; flex-direction: column; gap: 12px;
            z-index: 1000; transition: transform 0.3s ease;
        }
        .logo-area { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--glass); padding-bottom: 20px; }
        .moon-logo { font-size: 2.5rem; color: var(--accent-rose); filter: drop-shadow(0 0 8px var(--accent-rose)); }
        .sidebar-brand { font-family: 'Cinzel'; font-size: 1.5rem; color: var(--accent-mint); letter-spacing: 2px; display: block; margin-top: 10px; }

        .nav-btn {
            background: none; border: 1px solid transparent; color: var(--text-main);
            padding: 14px 18px; text-align: left; font-size: 0.9rem; cursor: pointer;
            border-radius: 12px; transition: 0.3s; display: flex; align-items: center; gap: 12px;
        }
        .nav-btn:hover { background: var(--glass); border-color: var(--accent-mint); color: var(--accent-mint); }

        /* --- MAIN CONTENT AREA --- */
        #main-content { margin-left: 280px; flex: 1; padding: 60px 20px; transition: 0.3s; }
        .container { display: none; max-width: 600px; margin: 0 auto; animation: fadeIn 0.5s ease; }
        .active-section { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- CLASSIC TASBEEH COUNTER --- */
        .counter-box {
            background: radial-gradient(circle, #1a1f26 0%, #0d1117 100%);
            width: min(80vw, 300px); height: min(80vw, 300px); border-radius: 50%; 
            margin: 60px auto; border: 2px solid var(--accent-lavender); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            cursor: pointer; box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 20px rgba(224, 187, 228, 0.1);
            transition: transform 0.1s;
        }
        .counter-box:active { transform: scale(0.95); }
        #count-num { font-size: 5rem; font-family: 'Cinzel'; color: var(--accent-mint); }

        /* --- RESPONSIVE FIXES --- */
        @media (max-width: 900px) {
            .mobile-header { display: flex; }
            #sidebar { transform: translateX(-100%); width: 260px; }
            #sidebar.open { transform: translateX(0); }
            #main-content { margin-left: 0; padding-top: 40px; }
            .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; }
            .sidebar-overlay.show { display: block; }
        }

        /* --- CLASSIC LISTS --- */
        .library-grid { display: flex; flex-direction: column; gap: 12px; }
        .library-card {
            background: #161b22; padding: 20px; border-radius: 15px;
            border: 1px solid var(--glass); cursor: pointer;
        }
        .arabic-text { font-family: 'Amiri'; font-size: 1.8rem; text-align: right; color: var(--accent-mint); line-height: 2; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <header class="mobile-header">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <span style="font-family: 'Cinzel'; color: var(--accent-mint); letter-spacing: 1px;">SoulSync</span>
        <div style="width: 24px;"></div> </header>

    <div class="lantern-container">
        <div class="lantern" style="--color: var(--accent-mint); margin-top: 5px;"></div>
        <div class="lantern" style="--color: var(--accent-rose); margin-top: 25px;"></div>
        <div class="lantern" style="--color: var(--accent-lavender); margin-top: 15px;"></div>
    </div>

    <aside id="sidebar">
        <div class="logo-area">
            <span class="moon-logo">🌙</span>
            <span class="sidebar-brand">SoulSync</span>
        </div>
        <button class="nav-btn" onclick="showSection('zikr')">💠 <span>Tasbeeh</span></button>
        <button class="nav-btn" onclick="showSection('library')">🌸 <span>Dua Library</span></button>
        <button class="nav-btn" onclick="showSection('quran')">🌿 <span>Quran</span></button>
        <button class="nav-btn" onclick="showSection('hadith')">✨ <span>Daily Hadith</span></button>
        <button class="nav-btn" onclick="showSection('stats')">📈 <span>My Progress</span></button>
    </aside>

    <main id="main-content">
        <div id="zikr" class="container active-section">
            <p id="active-zikr-text" style="text-align: center; color: var(--accent-lavender); font-size: 1.2rem;">SubhanAllah</p>
            <div class="counter-box" onclick="countUp()">
                <span id="count-num">0</span>
                <small style="color: #444; font-size: 0.7rem; letter-spacing: 2px;">TAP</small>
            </div>
            <div style="text-align: center;">
                <button class="nav-btn" style="margin: 0 auto; border: 1px solid var(--accent-rose); color: var(--accent-rose);" onclick="resetCount()">Reset</button>
            </div>
        </div>

        <div id="library" class="container">
            <h2 style="font-family: 'Cinzel'; color: var(--accent-rose); margin-bottom: 20px;">Dua Library</h2>
            <div class="library-grid">
                <div class="library-card" onclick="setDua('SubhanAllah')"><b style="color:var(--accent-mint)">SubhanAllah</b><br><small>Glory be to Allah</small></div>
                <div class="library-card" onclick="setDua('Alhamdulillah')"><b style="color:var(--accent-mint)">Alhamdulillah</b><br><small>Praise be to Allah</small></div>
                <div class="library-card" onclick="setDua('Allahu Akbar')"><b style="color:var(--accent-mint)">Allahu Akbar</b><br><small>Allah is Greatest</small></div>
            </div>
        </div>

        </main>

    <script>
        let count = 0;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('show');
        }

        function showSection(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            if(window.innerWidth <= 900) toggleSidebar();
        }

        function countUp() {
            count++;
            document.getElementById('count-num').innerText = count;
            if(navigator.vibrate) navigator.vibrate(40);
        }

        function resetCount() { count = 0; document.getElementById('count-num').innerText = 0; }

        function setDua(txt) {
            document.getElementById('active-zikr-text').innerText = txt;
            showSection('zikr');
            resetCount();
        }

        // Initialize any necessary APIs
    </script>
</body>
</html>
