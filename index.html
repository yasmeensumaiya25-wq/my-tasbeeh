<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Zikr Pro | Tasbeeh & Quran</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/D4AF37/000000?text=AZ">

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #996515;
            --black: #0A0A0A;
            --surface: #1A1A1A;
            --text: #E0E0E0;
        }

        body {
            margin: 0;
            background-color: var(--black);
            color: var(--text);
            font-family: 'Amiri', serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            user-select: none; /* Prevents text selection while tapping counter */
        }

        /* --- NAVIGATION --- */
        nav {
            background: var(--surface);
            border-bottom: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav button {
            background: none;
            border: none;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            display: none;
        }

        .active-section { display: block; }

        /* --- TASBEEH SECTION --- */
        .counter-card {
            background: radial-gradient(circle, #222 0%, #000 100%);
            border: 4px solid var(--gold);
            border-radius: 50%;
            width: 280px;
            height: 280px;
            margin: 30px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
            transition: transform 0.1s;
        }

        .counter-card:active { transform: scale(0.95); }

        #count { font-size: 5rem; color: var(--gold); font-family: 'Cinzel', serif; }
        
        .btn-gold {
            background: var(--gold);
            color: black;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-family: 'Cinzel';
        }

        /* --- QURAN SECTION --- */
        .quran-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select { background: var(--surface); color: var(--gold); border: 1px solid var(--gold); padding: 10px; font-family: 'Amiri'; width: 100%; }
        #quran-display { background: var(--surface); padding: 20px; border-radius: 10px; height: 60vh; overflow-y: auto; line-height: 2.2; border: 1px solid #333; }
        .arabic { font-size: 1.8rem; text-align: right; color: var(--gold); margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .translation { font-size: 1rem; color: #aaa; margin-bottom: 20px; font-style: italic; }

        /* --- STREAK & FAQ --- */
        .chart-box { background: var(--surface); padding: 15px; border-radius: 10px; border: 1px solid var(--gold); margin-top: 10px; }
        .faq-item { margin-bottom: 20px; border-bottom: 1px solid #333; }
        .faq-item h3 { color: var(--gold); }

    </style>
</head>
<body>

<nav>
    <button onclick="showSection('tasbeeh')">TASBEEH</button>
    <button onclick="showSection('quran')">QURAN</button>
    <button onclick="showSection('streak')">STREAK</button>
    <button onclick="showSection('faq')">FAQ</button>
</nav>

<div id="tasbeeh" class="container active-section">
    <h2 style="text-align:center; color:var(--gold); font-family:'Cinzel'">Digital Tasbeeh</h2>
    <div id="dhikr-info" style="text-align: center; color: #888; margin-bottom: 10px;">Select from Library</div>
    <div class="counter-card" onclick="increment()">
        <span id="count">0</span>
        <small style="color:var(--gold); letter-spacing: 2px;">TAP</small>
    </div>
    <div style="text-align: center;">
        <button class="btn-gold" onclick="reset()">RESET</button>
        <button class="btn-gold" onclick="alert('Library: SubhanAllah, Alhamdulillah, Allahu Akbar')">LIBRARY</button>
    </div>
</div>

<div id="quran" class="container">
    <h2 style="color:var(--gold); font-family:'Cinzel'">The Noble Quran</h2>
    <div class="quran-controls">
        <select id="surahSelect" onchange="loadSurah()"><option>Loading Surahs...</option></select>
        <select id="juzSelect" onchange="loadJuz()"><option value="">Select Juz</option></select>
    </div>
    <div id="quran-display">Please select a Surah...</div>
</div>

<div id="streak" class="container">
    <h2 style="color:var(--gold); font-family:'Cinzel'">Daily Progress</h2>
    <div class="chart-box">
        <canvas id="streakChart"></canvas>
    </div>
</div>

<div id="faq" class="container">
    <h2 style="color:var(--gold); font-family:'Cinzel'">Support</h2>
    <div class="faq-item">
        <h3>How to use?</h3>
        <p>Tap the golden circle to count. Use the Library to change your dhikr.</p>
    </div>
</div>

<script>
    let count = 0;
    function showSection(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        if(id === 'streak') initChart();
    }

    function increment() {
        count++;
        document.getElementById('count').innerText = count;
        if(navigator.vibrate) navigator.vibrate(50);
    }

    function reset() { count = 0; document.getElementById('count').innerText = 0; }

    function initChart() {
        const ctx = document.getElementById('streakChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5'],
                datasets: [{
                    label: 'Adhkars',
                    data: [500, 1200, 800, 2100, 1500],
                    borderColor: '#D4AF37',
                    backgroundColor: 'rgba(212, 175, 55, 0.2)',
                    fill: true
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }

    async function initQuran() {
        const res = await fetch('https://api.alquran.cloud/v1/surah');
        const data = await res.json();
        const select = document.getElementById('surahSelect');
        select.innerHTML = '<option>Select Surah</option>';
        data.data.forEach(s => {
            let opt = document.createElement('option');
            opt.value = s.number;
            opt.text = s.number + ". " + s.englishName;
            select.add(opt);
        });
        const jSel = document.getElementById('juzSelect');
        for(let i=1; i<=30; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.text = "Juz " + i; jSel.add(opt);
        }
    }

    async function loadSurah() {
        const id = document.getElementById('surahSelect').value;
        const display = document.getElementById('quran-display');
        display.innerHTML = "Loading...";
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}/editions/quran-uthmani,en.asad`);
        const data = await res.json();
        display.innerHTML = '';
        data.data[0].ayahs.forEach((ayah, i) => {
            display.innerHTML += `<div class="arabic">${ayah.text}</div><div class="translation">${data.data[1].ayahs[i].text}</div>`;
        });
    }

    async function loadJuz() {
        const id = document.getElementById('juzSelect').value;
        const display = document.getElementById('quran-display');
        display.innerHTML = "Loading...";
        const res = await fetch(`https://api.alquran.cloud/v1/juz/${id}/editions/quran-uthmani,en.asad`);
        const data = await res.json();
        display.innerHTML = `<h3>Juz ${id}</h3>`;
        data.data[0].ayahs.forEach((ayah, i) => {
            display.innerHTML += `<div class="arabic">${ayah.text}</div><div class="translation">${data.data[1].ayahs[i].text}</div>`;
        });
    }

    initQuran();
</script>

</body>
</html>
