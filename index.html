<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulSync | Zikr & Quran</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0A0C10; --sidebar-bg: #12151A; --accent-mint: #B2D8D8; --accent-rose: #FFD1DC; --accent-lavender: #E0BBE4; --text-main: #F0F6FC; --glass: rgba(255, 255, 255, 0.08); }
        body { margin: 0; background-color: var(--bg); color: var(--text-main); font-family: 'Poppins', sans-serif; display: flex; min-height: 100vh; overflow-x: hidden; }
        
        /* LANTERNS */
        .lantern-container { position: fixed; top: 0; width: 100%; height: 200px; pointer-events: none; z-index: 5; display: flex; justify-content: space-around; }
        .lantern { width: 35px; height: 55px; background: var(--color); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); box-shadow: 0 0 25px var(--color); animation: sway 4s ease-in-out infinite; position: relative; opacity: 0.7; }
        .lantern::before { content: ""; position: absolute; top: -50px; left: 50%; width: 1px; height: 50px; background: #333; }
        @keyframes sway { 0%, 100% { transform: rotate(-4deg); transform-origin: top; } 50% { transform: rotate(4deg); transform-origin: top; } }

        /* SIDEBAR */
        #sidebar { width: 260px; background: var(--sidebar-bg); height: 100vh; position: fixed; left: 0; top: 0; padding: 40px 20px; border-right: 1px solid var(--glass); display: flex; flex-direction: column; gap: 12px; }
        .sidebar-brand { font-family: 'Cinzel'; font-size: 1.7rem; color: var(--accent-mint); text-align: center; margin-bottom: 20px; }
        .nav-btn { background: none; border: 1px solid transparent; color: var(--text-main); padding: 14px; text-align: left; cursor: pointer; border-radius: 15px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover { background: var(--glass); color: var(--accent-mint); }
        .share-btn { margin-top: auto; border: 1px solid var(--accent-rose); color: var(--accent-rose); }

        /* CONTENT */
        #main-content { margin-left: 260px; flex: 1; padding: 40px; }
        .container { display: none; max-width: 700px; margin: 0 auto; animation: fadeInUp 0.7s ease-out; }
        .active-section { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* WIDGETS */
        .info-widget { background: var(--glass); border: 1px solid var(--accent-lavender); border-radius: 20px; padding: 20px; margin-bottom: 30px; text-align: center; }
        .counter-box { background: #141920; width: 260px; height: 260px; border-radius: 50%; margin: 30px auto; border: 3px solid var(--accent-lavender); display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
        .counter-box:active { transform: scale(0.95); }
        #count-num { font-size: 5rem; font-family: 'Cinzel'; color: var(--accent-mint); }
        .library-card { background: var(--glass); padding: 18px; border-radius: 15px; border: 1px solid #222; margin-bottom: 10px; cursor: pointer; }

        @media (max-width: 768px) { #sidebar { width: 80px; padding: 20px 10px; } .sidebar-brand, .nav-btn span { display: none; } #main-content { margin-left: 80px; padding: 20px; } }
    </style>
</head>
<body>

    <div class="lantern-container">
        <div class="lantern" style="--color: var(--accent-mint); margin-top: 10px;"></div>
        <div class="lantern" style="--color: var(--accent-rose); margin-top: 40px;"></div>
        <div class="lantern" style="--color: var(--accent-lavender); margin-top: 20px;"></div>
    </div>

    <aside id="sidebar">
        <div class="sidebar-brand">SoulSync</div>
        <button class="nav-btn" onclick="showSection('zikr')">💠 <span>Tasbeeh</span></button>
        <button class="nav-btn" onclick="showSection('library')">🌸 <span>Dua Library</span></button>
        <button class="nav-btn" onclick="showSection('quran')">🌿 <span>Quran</span></button>
        <button class="nav-btn" onclick="showSection('hadith')">✨ <span>Sahih Bukhari</span></button>
        <button class="nav-btn share-btn" onclick="shareApp()">📲 <span>Share App</span></button>
    </aside>

    <main id="main-content">
        <div class="info-widget">
            <div id="hijri-date" style="font-family: 'Amiri'; font-size: 1.5rem; color: var(--accent-mint);">Loading Hijri...</div>
            <div style="font-size: 0.7rem; color: #777; letter-spacing: 2px;">ISLAMIC DATE</div>
        </div>

        <div id="zikr" class="container active-section">
            <p id="active-zikr-text" style="text-align: center; color: var(--accent-lavender); font-style: italic;">SubhanAllah</p>
            <div class="counter-box" onclick="countUp()"><span id="count-num">0</span><small style="color:#555">TAP</small></div>
            <center><button onclick="resetCount()" style="background:none; border:1px solid var(--accent-rose); color:var(--accent-rose); padding:8px 25px; border-radius:20px; cursor:pointer;">Reset</button></center>
        </div>

        <div id="library" class="container">
            <h2 style="font-family:'Cinzel'; color:var(--accent-rose);">Dua Library</h2>
            <div class="library-card" onclick="setDua('SubhanAllah')"><b>SubhanAllah</b><br><small>Glory be to Allah</small></div>
            <div class="library-card" onclick="setDua('Alhamdulillah')"><b>Alhamdulillah</b><br><small>Praise be to Allah</small></div>
            <div class="library-card" onclick="setDua('Allahu Akbar')"><b>Allahu Akbar</b><br><small>Allah is Greatest</small></div>
            <div class="library-card" onclick="setDua('Astaghfirullah')"><b>Astaghfirullah</b><br><small>I seek forgiveness</small></div>
        </div>

        <div id="quran" class="container">
            <h2 style="font-family:'Cinzel'; color:var(--accent-lavender);">Quran</h2>
            <select id="surahSelect" onchange="loadSurah()" style="width:100%; background:#12151A; color:white; padding:15px; border-radius:12px; border:1px solid var(--glass); margin-bottom:20px;"></select>
            <div id="quran-text-display" style="max-height: 400px; overflow-y: auto; background: var(--glass); padding: 20px; border-radius: 15px;"></div>
        </div>

        <div id="hadith" class="container">
            <h2 style="font-family:'Cinzel'; color:var(--accent-mint);">Sahih Bukhari</h2>
            <div style="background:var(--glass); padding:30px; border-radius:20px; border-left:4px solid var(--accent-mint);">
                <p id="h-text" style="line-height:1.8;">Loading daily wisdom...</p>
                <p id="h-ref" style="color:var(--accent-rose); font-size:0.85rem; margin-top:15px;"></p>
            </div>
            <button class="nav-btn" style="margin-top:20px; width:100%; justify-content:center; border:1px solid #333;" onclick="fetchHadith()">New Hadith</button>
        </div>
    </main>

    <script>
        let count = 0;
        function showSection(id) { document.querySelectorAll('.container').forEach(c => c.classList.remove('active-section')); document.getElementById(id).classList.add('active-section'); }
        function countUp() { count++; document.getElementById('count-num').innerText = count; if(navigator.vibrate) navigator.vibrate(30); }
        function resetCount() { count = 0; document.getElementById('count-num').innerText = 0; }
        function setDua(txt) { document.getElementById('active-zikr-text').innerText = txt; showSection('zikr'); resetCount(); }

        function updateHijri() {
            const options = { calendar: 'islamic-uma', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('hijri-date').innerText = new Intl.DateTimeFormat('en-u-ca-islamic-uma', options).format(new Date());
        }

        async function initApp() {
            updateHijri();
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            const select = document.getElementById('surahSelect');
            data.data.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s.number; opt.text = s.number + ". " + s.englishName;
                select.add(opt);
            });
            fetchHadith();
        }

        async function loadSurah() {
            const id = document.getElementById('surahSelect').value;
            const display = document.getElementById('quran-text-display');
            display.innerHTML = "Opening the Book...";
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}/ar.alafasy`);
            const data = await res.json();
            display.innerHTML = data.data.ayahs.map(a => `<p style="font-family:'Amiri'; font-size:1.6rem; text-align:right; color:var(--accent-mint);">${a.text}</p>`).join('');
        }

        async function fetchHadith() {
            try {
                const res = await fetch('https://random-hadith-generator.vercel.app/bukhari/');
                const data = await res.json();
                document.getElementById('h-text').innerText = data.data.hadith_english;
                document.getElementById('h-ref').innerText = "Sahih Al-Bukhari | " + data.data.header;
            } catch(e) { document.getElementById('h-text').innerText = "Actions are judged by intentions."; }
        }

        function shareApp() {
            const shareData = { title: 'SoulSync', text: 'Check out SoulSync for Zikr & Quran!', url: window.location.href };
            if (navigator.share) { navigator.share(shareData); } 
            else { window.open(`https://wa.me/?text=Check out SoulSync: ${window.location.href}`); }
        }

        initApp();
    </script>
</body>
</html>
