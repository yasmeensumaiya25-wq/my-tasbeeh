<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulSync | Premium Spiritual Companion</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --dustygold: #C5A059; --obsidian: #050505; --champagne: #F7E7CE; }
        body { background-color: var(--obsidian); color: var(--champagne); font-family: 'Poppins', sans-serif; overflow: hidden; }
        .font-amiri { font-family: 'Amiri', serif; }
        .glass-card { background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(197, 160, 89, 0.15); }
        
        /* Sidebar Mobile Logic */
        #sidebar { transition: transform 0.3s ease-in-out; z-index: 50; }
        @media (max-width: 768px) {
            #sidebar { position: fixed; transform: translateX(-100%); height: 100%; }
            #sidebar.open { transform: translateX(0); }
        }

        /* Hanging Lanterns with Threads */
        .lantern-thread { width: 1px; height: 40px; background: var(--dustygold); opacity: 0.4; margin: 0 auto; }
        .lantern-body { 
            width: 30px; height: 45px; background: var(--dustygold); 
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
            box-shadow: 0 0 15px var(--dustygold); animation: flicker 2s infinite alternate;
        }
        @keyframes flicker { from { opacity: 0.5; } to { opacity: 1; } }

        .nav-item.active { border-left: 3px solid var(--dustygold); background: rgba(197, 160, 89, 0.1); color: var(--dustygold); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--dustygold); border-radius: 10px; }
    </style>
</head>
<body class="h-full flex">

    <button onclick="toggleMenu()" class="md:hidden fixed top-6 left-6 z-[60] p-2 glass-card rounded-lg text-dustygold">
        <i data-lucide="menu"></i>
    </button>

    <aside id="sidebar" class="w-64 bg-black border-r border-dustygold/20 flex flex-col">
        <div class="p-8 text-center">
            <div class="text-4xl text-dustygold mb-2">🌙</div>
            <h1 class="text-2xl font-amiri font-bold text-dustygold tracking-widest">SoulSync</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchPage('tasbeeh')" class="nav-item active w-full text-left px-4 py-3 rounded flex items-center gap-3 text-sm">
                <i data-lucide="hash"></i> Tasbeeh
            </button>
            <button onclick="switchPage('quran')" class="nav-item w-full text-left px-4 py-3 rounded flex items-center gap-3 text-sm">
                <i data-lucide="book-open"></i> Quran
            </button>
            <button onclick="switchPage('dhikr')" class="nav-item w-full text-left px-4 py-3 rounded flex items-center gap-3 text-sm">
                <i data-lucide="library"></i> Dhikr Library
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        
        <div class="absolute top-0 right-10 flex gap-6 z-10">
            <div><div class="lantern-thread"></div><div class="lantern-body"></div></div>
            <div><div class="lantern-thread" style="height:60px"></div><div class="lantern-body"></div></div>
        </div>

        <section id="page-tasbeeh" class="page-content flex-1 flex flex-col items-center justify-center p-8">
            <div class="text-center mb-10">
                <h2 class="text-5xl font-amiri text-dustygold mb-2">Digital Dhikr</h2>
                <div id="activeDhikrAr" class="text-3xl font-amiri mt-4 opacity-80">سُبْحَانَ اللَّهِ</div>
            </div>
            <div class="glass-card rounded-full w-64 h-64 flex flex-col items-center justify-center border-2 border-dustygold/40 cursor-pointer active:scale-95 transition" onclick="incrementCounter()">
                <div id="mainCount" class="text-7xl font-bold text-dustygold">0</div>
                <div class="text-[10px] uppercase tracking-widest opacity-40">Tap to Count</div>
            </div>
            <button onclick="resetCounter()" class="mt-8 text-dustygold/50 hover:text-dustygold uppercase text-xs tracking-widest">Reset</button>
        </section>

        <section id="page-quran" class="page-content hidden flex-1 flex flex-col md:flex-row gap-4 p-4 md:p-8 overflow-hidden">
            <div class="w-full md:w-72 glass-card rounded-xl p-4 overflow-y-auto custom-scrollbar">
                <h3 class="text-dustygold font-amiri text-xl mb-4 border-b border-dustygold/20 pb-2">Surahs</h3>
                <div id="surahList" class="space-y-1"></div>
            </div>
            <div class="flex-1 glass-card rounded-xl flex flex-col overflow-hidden">
                <div class="p-6 border-b border-dustygold/20 flex flex-col md:flex-row justify-between items-center gap-4">
                    <h2 id="currentSurahName" class="text-2xl font-amiri text-dustygold">Select a Surah</h2>
                    <audio id="quranAudio" controls class="w-full md:max-w-xs"></audio>
                </div>
                <div id="quranContent" class="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar">
                    <p class="text-center opacity-30 mt-20 italic">The word of Allah awaits...</p>
                </div>
            </div>
        </section>

        <section id="page-dhikr" class="page-content hidden flex-1 p-8 overflow-y-auto custom-scrollbar">
            <h2 class="text-4xl font-amiri text-center text-dustygold mb-10">Dhikr Library</h2>
            <div id="dhikrGrid" class="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto"></div>
        </section>

    </main>

    <script>
        // --- 1. CORE NAVIGATION ---
        function switchPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase().includes(pageId)) btn.classList.add('active');
            });

            if(window.innerWidth < 768) toggleMenu();
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }

            count++;
            document.getElementById('mainCount').innerText = count;
        }
        function resetCounter() {
            count = 0;
            document.getElementById('mainCount').innerText = 0;
        }
