<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulSync | Spiritual Hub</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <style>
        :root {
            --sidebar-bg: #1e293b;
            --main-bg: #0f172a;
            --card-bg: #1e293b;
            --pastel-blue: #bae6fd;
            --pastel-green: #bbf7d0;
            --pastel-pink: #fbcfe8;
            --pastel-yellow: #fef08a;
            --pastel-purple: #e9d5ff;
            --text-main: #f1f5f9;
            --sidebar-width: 260px;
        }

        body {
            background-color: var(--main-bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR & LOGO --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            border-right: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
            z-index: 100;
        }

        .logo-container {
            width: 60px;
            height: 60px;
            background: var(--pastel-blue);
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #0f172a;
            font-weight: bold;
            overflow: hidden;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand { font-size: 2.2rem; color: var(--pastel-blue); font-weight: 700; margin-bottom: 5px; letter-spacing: -1px; }
        .quote { font-size: 0.85rem; color: var(--pastel-pink); font-style: italic; margin-bottom: 40px; line-height: 1.4; }

        .nav-links { list-style: none; padding: 0; }
        .nav-links li {
            padding: 15px 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            color: var(--pastel-purple);
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }
        .nav-links li:hover, .nav-links li.active { background: rgba(255,255,255,0.05); color: white; }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 650px; width: 100%; }
        
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* --- DASHBOARD ELEMENTS --- */
        #tasbeeh-display { font-size: 5rem; text-align: center; color: var(--pastel-green); margin: 15px 0; cursor: pointer; font-weight: 200; }
        
        /* --- QURAN ELEMENTS --- */
        .quran-text { color: var(--pastel-blue); text-align: right; font-size: 1.6rem; margin: 15px 0; line-height: 1.8; }
        audio { width: 100%; filter: invert(0.8) hue-rotate(180deg); margin-top: 10px; }
        .search-bar { margin-bottom: 10px; background: rgba(255,255,255,0.1) !important; border: 1px solid var(--pastel-blue) !important; }

        /* --- JOURNAL ELEMENTS --- */
        input, textarea {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; font-family: inherit; box-sizing: border-box;
        }
        textarea { height: 120px; resize: none; }
        .entry-item { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--pastel-pink); }

        /* --- UI COMPONENTS --- */
        select, .btn {
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main); padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; margin-bottom: 10px;
        }
        .btn-primary { background: var(--pastel-blue); color: #0f172a; font-weight: bold; border: none; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 20px; border-right: none; }
            .main-content { margin-left: 0; padding: 20px; }
            .nav-links { display: flex; gap: 10px; margin-top: 20px; overflow-x: auto; }
            .nav-links li { white-space: nowrap; margin-bottom: 0; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo-container">
        S
    </div>
    <div class="brand">SoulSync</div>
    <div class="quote">"Verily, in the remembrance of Allah do hearts find rest."</div>
    <ul class="nav-links">
        <li onclick="showView('dashboard')" id="nav-dashboard" class="active">Dashboard</li>
        <li onclick="showView('journal')" id="nav-journal">Journal</li>
        <li onclick="showView('about')" id="nav-about">Beauty of Islam</li>
    </ul>
</aside>

<main class="main-content">
    <div class="container">
        <div id="dashboard" class="view-section active">
            <h2 style="color: var(--pastel-yellow); margin-top:0;" id="hijri-display">---</h2>
            <section class="card">
                <h3 style="color: var(--pastel-pink);">Tasbeeh</h3>
                <select id="dhikr-selector">
                    <option value="SubhanAllah">SubhanAllah</option>
                    <option value="Alhamdulillah">Alhamdulillah</option>
                    <option value="Allahu Akbar">Allahu Akbar</option>
                    <option value="Astaghfirullah">Astaghfirullah</option>
                </select>
                <div id="tasbeeh-display">0</div>
                <button class="btn btn-primary" onclick="resetCounter()" style="background: var(--pastel-green); color: #064e3b;">Reset</button>
            </section>
            <section class="card">
                <h3 style="color: var(--pastel-blue);">Quran Library</h3>
                <input type="text" id="surah-search" class="search-bar" placeholder="🔍 Search Surah name..." onkeyup="filterSurahs()">
                <select id="surah-selector" onchange="fetchSurah(this.value)"><option value="">Select Surah...</option></select>
                <div id="quran-display" style="display:none; margin-top:15px;">
                    <div class="quran-text" id="q-arabic">---</div>
                    <div style="font-size:0.85rem; color:#94a3b8; font-style:italic;" id="q-trans">---</div>
                    <audio id="quran-audio" controls></audio>
                </div>
            </section>
        </div>

        <div id="journal" class="view-section">
            <h2 style="color: var(--pastel-pink); margin-top:0;">Soul Reflections</h2>
            <div class="card">
                <input type="text" id="j-title" placeholder="Entry Title">
                <textarea id="j-content" placeholder="Write your thoughts here..."></textarea>
                <button class="btn btn-primary" onclick="saveEntry()">Save Reflection</button>
            </div>
            <div id="entries-list"></div>
        </div>

        <div id="about" class="view-section">
            <h2 style="color: var(--pastel-green); margin-top:0;">The Path of Peace</h2>
            <div class="card" style="border-left: 4px solid var(--pastel-green);">
                <p style="line-height: 1.8; opacity: 0.9;">Islam is the bridge between the transient world and the eternal soul.</p>
                <button class="btn btn-primary" onclick="shareSite()" style="margin-top:20px;">Share SoulSync</button>
            </div>
        </div>
    </div>
</main>

<script>
    // NAVIGATION
    function showView(viewId) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-links li').forEach(l => l.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        document.getElementById('nav-' + viewId).classList.add('active');
    }

    // HIJRI
    const hDate = new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', {day:'numeric', month:'long', year:'numeric'}).format(new Date());
    document.getElementById('hijri-display').innerText = hDate;

    // TASBEEH
    let count = 0;
    const tDisplay = document.getElementById('tasbeeh-display');
    tDisplay.addEventListener('click', () => { count++; tDisplay.innerText = count; });
    function resetCounter() { count = 0; tDisplay.innerText = count; }

    // QURAN
    let allSurahs = [];
    async function initQuran() {
        const res = await fetch('https://api.alquran.cloud/v1/surah');
        const data = await res.json();
        allSurahs = data.data;
        populateSurahDropdown(allSurahs);
    }
    function populateSurahDropdown(surahs) {
        const sel = document.getElementById('surah-selector');
        sel.innerHTML = '<option value="">Select Surah...</option>';
        surahs.forEach(s => sel.innerHTML += `<option value="${s.number}">${s.number}. ${s.englishName}</option>`);
    }
    function filterSurahs() {
        const term = document.getElementById('surah-search').value.toLowerCase();
        const filtered = allSurahs.filter(s => s.englishName.toLowerCase().includes(term));
        populateSurahDropdown(filtered);
    }
    async function fetchSurah(num) {
        if(!num) return;
        document.getElementById('quran-display').style.display = 'block';
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}/editions/quran-uthmani,en.asad,ar.alafasy`);
        const data = await res.json();
        document.getElementById('q-arabic').innerText = data.data[0].ayahs[0].text;
        document.getElementById('q-trans').innerText = data.data[1].ayahs[0].text;
        document.getElementById('quran-audio').src = data.data[2].ayahs[0].audio;
    }

    // JOURNAL
    function saveEntry() {
        const title = document.getElementById('j-title').value;
        const content = document.getElementById('j-content').value;
        if(!title || !content) return alert("Please fill both fields.");
        const entry = { title, content, date: new Date().toLocaleDateString(), id: Date.now() };
        let entries = JSON.parse(localStorage.getItem('ss_journal') || '[]');
        entries.unshift(entry);
        localStorage.setItem('ss_journal', JSON.stringify(entries));
        document.getElementById('j-title').value = ''; document.getElementById('j-content').value = '';
        displayEntries();
    }
    function displayEntries() {
        const list = document.getElementById('entries-list');
        const entries = JSON.parse(localStorage.getItem('ss_journal') || '[]');
        list.innerHTML = entries.map(e => `
            <div class="entry-item">
                <div style="font-size:0.7rem; color:var(--pastel-green);">${e.date}</div>
                <div style="font-weight:bold; margin:5px 0;">${e.title}</div>
                <div style="font-size:0.9rem; opacity:0.8;">${e.content}</div>
            </div>
        `).join('');
    }

    // PWA SERVICE WORKER REGISTRATION
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log('SoulSync Service Worker Registered');
            });
        });
    }

    initQuran();
    displayEntries();
</script>
</body>
</html>
