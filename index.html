<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulSync | Digital Tasbeeh</title>
    <style>
        /* --- CORE THEME --- */
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: rgba(25, 25, 25, 0.8);
            --emerald: #14b8a6;
            --gold-glow: #fbbf24;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR (Persistent) --- */
        .sidebar {
            width: 260px;
            background: rgba(15, 15, 15, 0.9);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: width 0.3s ease;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--emerald);
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .nav-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .nav-item.active {
            background: rgba(20, 184, 166, 0.1);
            color: var(--emerald);
            border-left: 3px solid var(--emerald);
        }

        /* --- LANTERNS --- */
        .header-area {
            position: relative;
            padding: 40px;
        }

        .lanterns-box {
            position: absolute;
            top: 10px;
            right: 40px;
            display: flex;
            gap: 15px;
        }

        .lantern {
            width: 40px;
            height: 60px;
            background: var(--gold-glow);
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
            box-shadow: 0 0 20px var(--gold-glow);
            animation: flicker 2s infinite alternate;
            opacity: 0.8;
        }

        @keyframes flicker {
            0% { opacity: 0.6; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 50px;
        }

        .tasbeeh-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .fingerprint-btn {
            width: 180px;
            height: 180px;
            margin: 20px auto;
            border-radius: 50%;
            border: 4px solid var(--emerald);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s active;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.2) 0%, transparent 70%);
        }

        .fingerprint-btn:active {
            transform: scale(0.95);
        }

        .count-display {
            font-size: 3rem;
            font-weight: bold;
        }

        .target-display {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* --- MOBILE FRIENDLY OVERRIDES --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            
            .sidebar {
                width: 100%;
                height: 60px;
                flex-direction: row;
                padding: 0 10px;
                order: 2; /* Moves sidebar to bottom */
                justify-content: space-around;
                align-items: center;
            }

            .logo, .nav-item span { display: none; } /* Hide text for space */
            
            .nav-item { padding: 10px; margin: 0; }

            .main-content { order: 1; height: calc(100vh - 60px); }

            .lanterns-box { right: 20px; top: 20px; scale: 0.7; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">SoulSync</div>
        <a href="#" class="nav-item active">🏠 <span>Tasbeeh</span></a>
        <a href="#" class="nav-item">📖 <span>Quran</span></a>
        <a href="#" class="nav-item">✨ <span>Library</span></a>
        <a href="#" class="nav-item">📈 <span>Streak</span></a>
    </nav>

    <main class="main-content">
        <div class="lanterns-box">
            <div class="lantern" style="height: 50px;"></div>
            <div class="lantern"></div>
            <div class="lantern" style="height: 40px;"></div>
        </div>

        <h2 style="letter-spacing: 3px; color: var(--text-muted); font-size: 0.8rem;">DIGITAL TASBEEH</h2>

        <div class="tasbeeh-card">
            <p id="phrase-text" style="font-size: 1.5rem; margin-bottom: 10px;">SubhanAllah</p>
            
            <div class="fingerprint-btn" onclick="incrementCount()">
                <div class="count-display" id="main-count">0</div>
                <div class="target-display">/ <span id="target-num">33</span></div>
            </div>

            <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
                <button onclick="resetCount()" style="background: none; border: 1px solid var(--text-muted); color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Reset</button>
                <button onclick="setTarget()" style="background: var(--emerald); border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Set Target</button>
            </div>
        </div>
    </main>

    <script>
        let count = 0;
        let target = 33;

        function incrementCount() {
            count++;
            document.getElementById('main-count').innerText = count;
            if (count >= target) {
                alert("Goal reached! Alhamdulillah.");
            }
        }

        function resetCount() {
            count = 0;
            document.getElementById('main-count').innerText = count;
        }

        function setTarget() {
            let newTarget = prompt("Enter your target:", "33");
            if (newTarget) {
                target = parseInt(newTarget);
                document.getElementById('target-num').innerText = target;
                resetCount();
            }
        }
    </script>
</body>
</html>
