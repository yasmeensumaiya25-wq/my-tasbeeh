<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoulSync | Zikr & Quran</title>
    <link rel="icon" type="image/png" href="logo.png.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0A0C10; --sidebar-bg: #12151A; --accent-mint: #B2D8D8; --accent-rose: #FFD1DC; --accent-lavender: #E0BBE4; --text-main: #F0F6FC; --glass: rgba(255, 255, 255, 0.08); }
        body { margin: 0; background-color: var(--bg); color: var(--text-main); font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        
        /* LANTERNS */
        .lantern-container { position: fixed; top: 0; width: 100%; height: 200px; pointer-events: none; z-index: 5; display: flex; justify-content: space-around; }
        .lantern-group { display: flex; flex-direction: column; align-items: center; animation: sway 4s infinite; transform-origin: top; }
        .thread { width: 1px; height: 80px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.4)); }
        .lantern { width: 20px; height: 32px; background: var(--color); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); opacity: 0.7; }
        @keyframes sway { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }

        /* SIDEBAR & HEADER */
        .mobile-header { display: none; padding: 15px; background: var(--sidebar-bg); justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass); position: sticky; top: 0; z-index: 100; }
        #sidebar { width: 260px; background: var(--sidebar-bg); height: 100vh; position: fixed; left: 0; top: 0; padding: 40px 20px; border-right: 1px solid var(--glass); z-index: 1000; transition: 0.3s; }
        .nav-btn { background: none; border: none; color: var(--text-main); padding: 12px; text-align: left; cursor: pointer; width: 100%; display: flex; align-items: center; gap: 10px; border-radius: 8px; }
        .nav-btn:hover { background: var(--glass); }

        #main-content { margin-left: 260px; padding: 40px 20px; transition: 0.3s; }
        .container { display: none; max-width: 600px; margin: 0 auto; }
        .active-section { display: block; }

        /* WIDGETS */
        .info-widget { background: var(--glass); border: 1px solid var(--accent-lavender); border-radius: 15px; padding: 15px; margin-bottom: 30px; text-align: center; }
        .counter-box { background: #161b22; width: 240px; height: 240px; border-radius: 50%; margin: 30px auto; border: 2px solid var(--accent-lavender); display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        #count-num { font-size: 3.5rem; font-family: 'Cinzel'; color: var(--accent-mint); }
        .card { background: #161b22; padding: 18px; border-radius: 12px; border: 1px solid var(--glass); margin-bottom: 12px; cursor: pointer; }

        @media (max-width: 900px) {
            .mobile-header { display: flex; }
            #sidebar { transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            #main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <header class="mobile-header"><button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.5rem;">☰</button><span style="font-family:'Cinzel';">SoulSync</span><div style="width:24px;"></div></header>

    <div class="lantern-container">
        <div class="lantern-group"><div class="thread"></div><div class="lantern" style="--color: var(--accent-mint);"></div></div>
        <div class="lantern-group" style="margin-top: 30px;"><div class="thread"></div><div class="lantern" style="--color: var(--accent-rose);"></div></div>
    </div>

    <aside id="sidebar">
        <h2 style="font-family:'Cinzel'; text-align:center; color:var(--accent-mint);">SoulSync</h2>
        <button class="nav-btn" onclick="showSection('zikr')">💠 Tasbeeh</button>
        <button class="nav-btn" onclick="showSection('library')">🌸 Dua Library</button>
        <button class="nav-btn" onclick="showSection('quran')">🌿 Quran</button>
    </aside>

    <main id="main-content">
        <div class="info-widget">
            <div id="hijri-date" style="font-family:'Amiri'; font-size:1.4rem; color:var(--accent-mint);">Loading...</div>
            <div style="font-size:0.6rem; color:#777; letter-spacing:2px; margin-top:5px;">ISLAMIC DATE</div>
        </div>

        <div id="zikr" class="container active-section">
            <p id="active-zikr-text" style="text-align:center; color:var(--accent-lavender); font-style:italic;">SubhanAllah</p>
            <div class="counter-box" onclick="countUp()"><span id="count-num">0</span><small style="color:#444; font-size:0.6rem;">COUNT</small></div>
            <button onclick="resetCount()" style="display:block; margin:auto; background:none; border:1px solid var(--accent-rose); color:var(--accent-rose); padding:5px 20px; border-radius:5px;">Reset</button>
        </div>

        <div id="library" class="container">
            <h3 style="font-family:'Cinzel';">Dua Library</h3>
            <div class="card" onclick="setDua('SubhanAllah')">SubhanAllah</div>
            <div class="card" onclick="setDua('Alhamdulillah')">Alhamdulillah</div>
            <div class="card" onclick="setDua('Allahu Akbar')">Allahu Akbar</div>
            <div class="card" onclick="setDua('Astaghfirullah')">Astaghfirullah</div>
        </div>

        <div id="quran" class="container"><h3 style="font-family:'Cinzel';">Quran</h3><p style="color:#777">Coming Soon</p></div>
    </main>

    <script>
        let count = 0;
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function showSection(id) { document.querySelectorAll('.container').forEach(c => c.classList.remove('active-section')); document.getElementById(id).classList.add('active-section'); if(window.innerWidth <= 900) toggleSidebar(); }
        function countUp() { count++; document.getElementById('count-num').innerText = count; if(navigator.vibrate) navigator.vibrate(30); }
        function resetCount() { count = 0; document.getElementById('count-num').innerText = 0; }
        function setDua(txt) { document.getElementById('active-zikr-text').innerText = txt; showSection('zikr'); resetCount(); }
        
        function updateDate() {
            const today = new Date();
            const options = { calendar: 'islamic-uma', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('hijri-date').innerText = new Intl.DateTimeFormat('en-u-ca-islamic-uma', options).format(today);
        }
        updateDate();
    </script>
</body>
</html>
