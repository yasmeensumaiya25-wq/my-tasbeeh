<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulSync | Spiritual Hub</title>
    <style>
        :root {
            --bg: #0f172a;
            --side: #1e293b;
            --accent: #bae6fd;
            --text: #f1f5f9;
            --glass: rgba(255, 255, 255, 0.03);
            --pink: #fbcfe8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: var(--side);
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            border-right: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
        }

        .logo { font-size: 2rem; color: var(--accent); font-weight: 800; margin-bottom: 5px; }
        .quote { font-size: 0.8rem; color: var(--pink); opacity: 0.8; margin-bottom: 40px; font-style: italic; }

        .nav { list-style: none; padding: 0; }
        .nav li {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            color: #94a3b8;
        }
        .nav li:hover, .nav li.active { background: var(--glass); color: white; border-left: 4px solid var(--accent); }

        /* --- CONTENT --- */
        .main { margin-left: 260px; flex: 1; padding: 40px; display: flex; justify-content: center; }
        .container { max-width: 700px; width: 100%; }

        .view { display: none; animation: fadeIn 0.5s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 25px; margin-bottom: 20px; }

        /* --- DHIKR LIBRARY --- */
        .dhikr-grid { display: grid; gap: 15px; }
        .dhikr-item { 
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; 
            cursor: pointer; transition: 0.3s; text-align: center;
        }
        .dhikr-item:hover { background: rgba(255,255,255,0.1); transform: scale(1.02); }
        #counter { font-size: 4rem; text-align: center; color: var(--accent); margin: 20px 0; }

        /* --- QURAN --- */
        select, input {
            width: 100%; background: var(--side); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; font-family: inherit;
        }
        .quran-content { max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .ayah-box { margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .arabic { font-size: 1.8rem; text-align: right; color: var(--accent); margin-bottom: 10px; line-height: 2.2; }
        .trans { font-size: 0.95rem; color: #94a3b8; line-height: 1.6; }
        audio { width: 100%; filter: invert(0.8); margin-top: 10px; }

        .btn { background: var(--accent); color: #0f172a; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; padding: 20px; }
            .main { margin-left: 0; padding: 20px; }
            .nav { display: flex; overflow-x: auto; gap: 10px; }
            .nav li { white-space: nowrap; margin-bottom: 0; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">SoulSync</div>
    <div class="quote">"In the remembrance of Allah do hearts find rest."</div>
    <ul class="nav">
        <li onclick="showView('library')" id="nav-library" class="active">Dhikr Library</li>
        <li onclick="showView('quran')" id="nav-quran">Quran</li>
        <li onclick="showView('journal')" id="nav-journal">Journal</li>
    </ul>
</aside>

<main class="main">
    <div class="container">
        
        <div id="library" class="view active">
            <h2 style="color: var(--accent);">Adhkar</h2>
            <div id="dhikr-ui" style="display:none;">
                <div class="card">
                    <button onclick="backToLib()" style="background:none; border:none; color:var(--pink); cursor:pointer;"><- Back</button>
                    <h3 id="current-dhikr-name" style="text-align:center;">---</h3>
                    <div id="counter">0</div>
                    <button class="btn" onclick="countUp()">Tap to Count</button>
                    <button onclick="resetC()" style="background:none; border:none; color:gray; width:100%; margin-top:10px; cursor:pointer;">Reset</button>
                </div>
            </div>
            <div class="dhikr-grid" id="lib-grid">
                </div>
        </div>

        <div id="quran" class="view">
            <h2 style="color: var(--accent);">Holy Qur'an</h2>
            <div class="card">
                <input type="text" id="q-search" placeholder="Search Surah..." onkeyup="filterQ()">
                <select id="q-select" onchange="fetchFullSurah(this.value)"><option>Select Surah...</option></select>
                <div id="q-loading" style="display:none; text-align:center;">Loading beautiful verses...</div>
            </div>
            <div id="q-result" class="card" style="display:none;">
                <audio id="q-audio" controls style="margin-bottom:20px;"></audio>
                <div class="quran-content" id="q-text"></div>
            </div>
        </div>

        <div id="journal" class="view">
            <h2 style="color: var(--pink);">Reflections</h2>
            <div class="card">
                <input type="text" id="j-title" placeholder="Title of reflection">
                <textarea id="j-text" placeholder="What are you grateful for today?" style="width:100%; height:150px; background:var(--side); border:none; border-radius:12px; color:white; padding:15px; margin-bottom:15px; font-family:inherit;"></textarea>
                <button class="btn" onclick="saveJ()">Save to SoulSync</button>
            </div>
            <div id="j-list"></div>
        </div>

    </div>
</main>

<script>
    // --- NAVIGATION ---
    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav li').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('nav-'+id).classList.add('active');
    }

    // --- DHIKR LOGIC ---
    const adhkars = [
        "SubhanAllah", "Alhamdulillah", "Allahu Akbar", "La ilaha illallah", 
        "Astaghfirullah", "SubhanAllahi wa bihamdihi", "La hawla wala quwwata illa billah",
        "HasbunAllahu wa ni'mal wakil", "SubhanAllahi al-Azim", "Allahumma salli ala Muhammad"
    ];
    let currentCount = 0;

    function initLib() {
        const grid = document.getElementById('lib-grid');
        adhkars.forEach(a => {
            grid.innerHTML += `<div class="dhikr-item" onclick="startDhikr('${a}')">${a}</div>`;
        });
    }

    function startDhikr(name) {
        document.getElementById('lib-grid').style.display = 'none';
        document.getElementById('dhikr-ui').style.display = 'block';
        document.getElementById('current-dhikr-name').innerText = name;
        resetC();
    }

    function backToLib() {
        document.getElementById('lib-grid').style.display = 'grid';
        document.getElementById('dhikr-ui').style.display = 'none';
    }

    function countUp() { currentCount++; document.getElementById('counter').innerText = currentCount; }
    function resetC() { currentCount = 0; document.getElementById('counter').innerText = 0; }

    // --- QURAN LOGIC (ALAFASY) ---
    let surahList = [];
    async function initQuran() {
        const res = await fetch('https://api.alquran.cloud/v1/surah');
        const data = await res.json();
        surahList = data.data;
        populateQ(surahList);
    }

    function populateQ(list) {
        const sel = document.getElementById('q-select');
        sel.innerHTML = '<option value="">Select Surah...</option>';
        list.forEach(s => sel.innerHTML += `<option value="${s.number}">${s.number}. ${s.englishName}</option>`);
    }

    function filterQ() {
        const term = document.getElementById('q-search').value.toLowerCase();
        populateQ(surahList.filter(s => s.englishName.toLowerCase().includes(term)));
    }

    async function fetchFullSurah(num) {
        if(!num) return;
        document.getElementById('q-loading').style.display = 'block';
        document.getElementById('q-result').style.display = 'none';

        // Fetch Arabic, English translation, and Audio (Mishary Alafasy)
        const [arRes, enRes, audRes] = await Promise.all([
            fetch(`https://api.alquran.cloud/v1/surah/${num}/quran-uthmani`),
            fetch(`https://api.alquran.cloud/v1/surah/${num}/en.asad`),
            fetch(`https://api.alquran.cloud/v1/surah/${num}/ar.alafasy`)
        ]);

        const arData = await arRes.json();
        const enData = await enRes.json();
        const audData = await audRes.json();

        const container = document.getElementById('q-text');
        container.innerHTML = '';
        
        arData.data.ayahs.forEach((ayah, i) => {
            container.innerHTML += `
                <div class="ayah-box">
                    <div class="arabic">${ayah.text}</div>
                    <div class="trans">${enData.data.ayahs[i].text}</div>
                </div>
            `;
        });

        document.getElementById('q-audio').src = audData.data.ayahs[0].audio; // Plays from first ayah
        document.getElementById('q-loading').style.display = 'none';
        document.getElementById('q-result').style.display = 'block';
    }

    // --- JOURNAL LOGIC ---
    function saveJ() {
        const t = document.getElementById('j-title').value;
        const b = document.getElementById('j-text').value;
        if(!t || !b) return;
        const entry = { t, b, d: new Date().toLocaleDateString() };
        let logs = JSON.parse(localStorage.getItem('ss_j') || '[]');
        logs.unshift(entry);
        localStorage.setItem('ss_j', JSON.stringify(logs));
        document.getElementById('j-title').value = ''; document.getElementById('j-text').value = '';
        loadJ();
    }

    function loadJ() {
        const list = document.getElementById('j-list');
        const logs = JSON.parse(localStorage.getItem('ss_j') || '[]');
        list.innerHTML = logs.map(l => `
            <div class="card">
                <small style="color:var(--accent)">${l.d}</small>
                <h4 style="margin:5px 0;">${l.t}</h4>
                <p style="opacity:0.8; font-size:0.9rem;">${l.b}</p>
            </div>
        `).join('');
    }

    initLib();
    initQuran();
    loadJ();
</script>
</body>
</html>
