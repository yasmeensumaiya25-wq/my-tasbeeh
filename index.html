<!DOCTYPE html>
<html>
<head>
    <title>SoulSync | Digital Tasbeeh</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Quicksand&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --pink: #ffafcc;
            --blue: #a2d2ff;
            --green: #b9fbc0;
            --purple: #cdb4db;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            display: flex;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 220px;
            background: var(--card);
            height: 100vh;
            padding: 20px;
            border-right: 2px solid #333;
        }

        .sidebar h2 { font-family: 'Amiri', serif; color: var(--green); font-size: 28px; }

        .nav-item {
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .nav-item:hover { background: #333; color: var(--blue); }

        /* Main Area */
        .main-content {
            flex-grow: 1;
            padding: 50px;
            text-align: center;
        }

        /* Fingerprint Tap Circle */
        .tap-circle {
            width: 140px;
            height: 140px;
            border: 4px solid var(--pink);
            border-radius: 50%;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            cursor: pointer;
            transition: 0.1s;
            user-select: none;
            box-shadow: 0 0 15px rgba(255, 175, 204, 0.2);
        }

        .tap-circle:active { transform: scale(0.9); background: rgba(255, 175, 204, 0.1); }

        .counter-text { font-size: 70px; margin: 10px 0; color: var(--blue); font-weight: bold; }

        /* Buttons */
        .btn {
            background: var(--purple);
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Quicksand', sans-serif;
            margin: 5px;
        }

        .share-btn { background: var(--blue); margin-top: 20px; width: 100%; }

        /* Audio Player Style */
        .audio-section {
            margin-top: 40px;
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--blue);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>SoulSync</h2>
        <p id="date" style="color: var(--pink); font-size: 14px;"></p>
        <hr style="border: 0.5px solid #333;">
        <div class="nav-item">Dhikr Counter</div>
        <div class="nav-item">Quran Library</div>
        <div class="nav-item">Beauty of Islam</div>
        <button class="btn share-btn" onclick="share()">Share SoulSync</button>
    </div>

    <div class="main-content">
        <h3 style="color: var(--green); font-family: 'Amiri', serif; font-size: 24px;">SubhanAllah</h3>
        <div class="counter-text" id="count">0</div>
        
        <div class="tap-circle" onclick="addOne()">☝️</div>
        
        <p style="color: #888;">Tap the fingerprint to count your Dhikr</p>
        <button class="btn" onclick="reset()" style="background: var(--pink);">Reset Counter</button>

        <div class="audio-section">
            <h4 style="color: var(--blue); margin-top: 0;">Mishary Alafasy Recitation</h4>
            <audio controls style="width: 100%;">
                <source src="https://server8.mp3quran.net/afs/001.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <p style="font-size: 12px; color: #888; margin-bottom: 0;">Currently Playing: Surah Al-Fatiha</p>
        </div>

        <div style="margin-top: 30px; background: var(--card); padding: 20px; border-radius: 15px;">
            <p style="margin-top: 0;"><strong>5-Day Streak Data:</strong></p>
            <p id="streak" style="color: var(--green); letter-spacing: 5px;">33 • 100 • 33 • 0 • 0</p>
        </div>
    </div>

    <script>
        let total = 0;
        
        function addOne() {
            total++;
            document.getElementById('count').innerText = total;
        }

        function reset() {
            total = 0;
            document.getElementById('count').innerText = total;
        }

        function share() {
            alert("SoulSync link copied to clipboard!");
        }

        // Set the Hijri Date automatically
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('date').innerText = new Intl.DateTimeFormat('en-u-ca-islamic-uma', options).format(new Date());
    </script>

</body>
</html>
