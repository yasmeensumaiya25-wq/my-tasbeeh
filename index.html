<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiant Quran | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg: #0f111a;
            --card-bg: #1a1d2e;
            --accent: #f472b6; /* Pink */
            --glow: #34d399;   /* Mint */
            --text: #e2e8f0;
            --sub-text: #94a3b8;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Quicksand', sans-serif; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at 2px 2px, rgba(52, 211, 153, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        header {
            text-align: center; padding: 50px 20px; background: rgba(255,255,255,0.02);
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 40px; backdrop-filter: blur(10px);
        }

        h1 { margin: 0; font-size: 2.5rem; letter-spacing: -1px; }
        .mint-glow { color: var(--glow); text-shadow: 0 0 15px rgba(52, 211, 153, 0.4); }

        /* --- CONTROLS --- */
        .search-area {
            display: flex; gap: 15px; margin-bottom: 30px; justify-content: center;
        }
        input, select {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 12px 20px; border-radius: 15px; outline: none;
            font-family: 'Quicksand'; font-size: 1rem;
        }
        .btn-load {
            background: var(--accent); color: #000; border: none;
            padding: 12px 25px; border-radius: 15px; cursor: pointer;
            font-weight: 700; transition: 0.3s;
        }
        .btn-load:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(244, 114, 182, 0.4); }

        /* --- VERSES DISPLAY --- */
        .ayah-card {
            background: var(--card-bg); border-radius: 30px; padding: 35px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.03);
            transition: 0.3s; position: relative;
        }

        .arabic-text {
            font-family: 'Amiri', serif; font-size: 2.4rem; text-align: right;
            color: #fff; line-height: 2.2; margin-bottom: 20px; direction: rtl;
        }

        .translation-text {
            font-size: 1.1rem; color: var(--sub-text); line-height: 1.6;
            border-left: 3px solid var(--accent); padding-left: 20px;
        }

        .audio-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.05); border: none; color: var(--glow);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .loader { text-align: center; color: var(--accent); display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <i data-lucide="moon" color="#34d399" size="40" style="margin-bottom:15px;"></i>
        <h1>Radiant <span class="mint-glow">Quran</span></h1>
        <p style="color: var(--sub-text);">Connect to the Divine Words with Tafseer</p>
    </header>

    <div class="search-area">
        <input type="number" id="surahNum" placeholder="Surah (1-114)" value="1" min="1" max="114" style="width: 120px;">
        <button class="btn-load" onclick="fetchSurah()">Load Surah</button>
    </div>

    <div id="loader" class="loader">✨ Loading beautiful verses...</div>
    <div id="quranContainer">
        </div>
</div>

<script>
    lucide.createIcons();

    async function fetchSurah() {
        const num = document.getElementById('surahNum').value;
        const container = document.getElementById('quranContainer');
        const loader = document.getElementById('loader');

        // Reset & Show Loader
        container.innerHTML = '';
        loader.style.display = 'block';

        try {
            // We fetch Arabic and English simultaneously
            const [arRes, enRes] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/surah/${num}`),
                fetch(`https://api.alquran.cloud/v1/surah/${num}/en.sahih`)
            ]);

            const arData = await arRes.json();
            const enData = await enRes.json();

            loader.style.display = 'none';

            arData.data.ayahs.forEach((ayah, index) => {
                const enAyah = enData.data.ayahs[index];
                
                const card = document.createElement('div');
                card.className = 'ayah-card';
                card.innerHTML = `
                    <button class="audio-btn" onclick="playAudio(${ayah.number})">
                        <i data-lucide="play" size="18"></i>
                    </button>
                    <div class="arabic-text">${ayah.text}</div>
                    <div class="translation-text">
                        <small style="color:var(--accent)">Ayah ${ayah.numberInSurah}</small><br>
                        ${enAyah.text}
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
            
        } catch (error) {
            loader.innerHTML = "❌ Oops! Something went wrong.";
            console.error(error);
        }
    }

    function playAudio(number) {
        // Simple audio fetch
        const audio = new Audio(`https://cdn.islamic.network/quran/audio/128/ar.alafasy/${number}.mp3`);
        audio.play();
    }

    // Initial load
    fetchSurah();
</script>

</body>
</html>
